<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
	    <title>register</title>
    </head>
    <body>
        <h1>register</h1>
        <form action="/register"  method="post">   
            <label for="ant">username:</label><br>
            <input type="text" id="ant" name="ant" required><br>
            <label for="pwd">password:</label><br>
            <input type="password" id="pwd" name="pwd" required><br>
            <button type="submit" >register</button>
        </form> 
        <p>Already registered? <a href="/login">Login</a></p>
        {% if 'REDIRECT_TO_LOGIN' in get_flashed_messages() %}
        <script>
            // 使用 confirm 弹出带有“确定”和“取消”选项的对话框
            var goLogin = confirm("注册成功！\n是否直接跳转至登录界面？");
            if (goLogin) {
                // 如果用户点击了“确定”,就跳转到登录页
                window.location.href = "/login";
            } 
        </script>
        {% endif %}
    </body>
</html>
